<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Twitter Preview -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Click Here to Access!" />
<meta name="twitter:description" content="Get access now by clicking the link." />
<meta name="twitter:image" content="https://i.imgur.com/LW53KEz.png" />

</head>
<body>

<script>
// ===== SMART LINKS =====
var links = [
    "https://www.effectivegatecpm.com/qwrbesrk?key=a16d211d02fbe32fa29d7bb9035aff44",
    "https://www.effectivegatecpm.com/ztj5w2myb2?key=f79737b0122e9f212f04f832582639bd",
    "https://www.effectivegatecpm.com/ks7uqun55?key=0e5286d226dda1a44faa33a3cc257512",
    "https://www.effectivegatecpm.com/xa4v69ebp?key=62079b05ebf5a63f468e7017849264af",
    "https://www.effectivegatecpm.com/qi7puzt1?key=464fb4582c84f557321f9335262eb375",
    "https://www.effectivegatecpm.com/mq2h6va2g?key=84fd8af9fbf4199827f781b89631e3d7",
];

// ===== RANDOM LINK FUNCTION =====
function getRandomLink() {
    return links[Math.floor(Math.random() * links.length)];
}

// ===== REDIRECT =====
if (!sessionStorage.getItem("visited")) {
    sessionStorage.setItem("visited", "1");
    window.location.href = getRandomLink(); // 0 delay
}
</script>

</body>
</html>
